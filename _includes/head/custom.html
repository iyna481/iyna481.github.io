{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  .author__avatar {
    display: none !important;
  }

  .author__content {
    margin-top: 0.5rem !important;
  }

  .author__name {
    font-size: 1.25rem !important;
  }

  .author__bio {
    color: #4b5563 !important;
    font-size: 0.92rem !important;
    line-height: 1.5 !important;
  }

  .site-hero {
    margin: 0 0 0.6rem 0 !important;
    padding: 2.2rem !important;
    border-radius: 18px !important;
    border: 1px solid #cbd5e1 !important;
    background:
      linear-gradient(90deg, rgba(15, 23, 42, 0.86) 0%, rgba(30, 64, 175, 0.58) 58%, rgba(15, 23, 42, 0.34) 100%),
      url("https://eoimages.gsfc.nasa.gov/images/imagerecords/136000/136245/PacificOcean.A2016032.1925_th.jpg") !important;
    background-size: cover !important;
    background-position: center !important;
    color: #ffffff !important;
    box-shadow: 0 14px 32px rgba(15, 23, 42, 0.12) !important;
  }

  .site-hero .eyebrow {
    margin: 0 0 0.6rem 0 !important;
    color: #bfdbfe !important;
    font-size: 0.86rem !important;
    font-weight: 700 !important;
    letter-spacing: 0.04em !important;
    text-transform: uppercase !important;
  }

  .site-hero h1 {
    margin: 0 !important;
    color: #ffffff !important;
    font-size: 2.25rem !important;
    line-height: 1.15 !important;
  }

  .site-hero p {
    margin: 0.85rem 0 0 0 !important;
    max-width: 760px !important;
    color: #f8fafc !important;
    font-size: 1.02rem !important;
    line-height: 1.65 !important;
  }

  .image-credit {
    margin: 0 0 2rem 0 !important;
    color: #64748b !important;
    font-size: 0.78rem !important;
    line-height: 1.4 !important;
  }

  .image-credit a {
    color: #64748b !important;
    text-decoration: underline !important;
  }

  .pill-row {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 0.5rem !important;
    margin-top: 1.25rem !important;
  }

  .pill {
    display: inline-block !important;
    padding: 0.35rem 0.7rem !important;
    border: 1px solid rgba(255, 255, 255, 0.55) !important;
    border-radius: 999px !important;
    background: rgba(255, 255, 255, 0.16) !important;
    color: #ffffff !important;
    font-size: 0.85rem !important;
    font-weight: 600 !important;
    backdrop-filter: blur(2px) !important;
  }

  .research-grid,
  .info-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)) !important;
    gap: 1rem !important;
    margin: 1.1rem 0 1.8rem 0 !important;
  }

  .research-card,
  .info-card {
    padding: 1rem 1.05rem !important;
    border: 1px solid #e5e7eb !important;
    border-radius: 14px !important;
    background: #ffffff !important;
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04) !important;
  }

  .research-card h3,
  .info-card h3 {
    margin-top: 0 !important;
    margin-bottom: 0.45rem !important;
    font-size: 1.02rem !important;
  }

  .research-card p,
  .info-card p {
    margin: 0 !important;
    line-height: 1.55 !important;
  }

  .link-button {
    display: inline-block !important;
    margin-top: 0.8rem !important;
    padding: 0.55rem 0.85rem !important;
    border-radius: 10px !important;
    background: #2563eb !important;
    color: #ffffff !important;
    font-weight: 700 !important;
    text-decoration: none !important;
  }

  .link-button:hover {
    background: #1d4ed8 !important;
    text-decoration: none !important;
  }
